<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caligrafia UI concept 01 - Workbench</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="layout-workbench">
    <nav class="concept-nav" aria-label="UI concepts">
      <strong>Caligrafia UI research</strong>
      <a href="./01-workbench.html" aria-current="page">01 Workbench</a>
      <a href="./02-flow.html">02 Flow</a>
      <a href="./03-notebook.html">03 Notebook</a>
      <a href="./04-command.html">04 Command</a>
      <a href="./05-atelier.html">05 Atelier</a>
      <a href="./index.html">All</a>
    </nav>

    <main class="workbench-main">
      <section class="workbench-controls" aria-label="Настройки листа">
        <div class="workbench-title">
          <p class="research-note">01 / Теплая мастерская</p>
          <h1>Собери пропись</h1>
          <p class="research-note">
            Ставка на ясную левую панель, бумажную фактуру и ощущение ручной работы без декоративного шума.
          </p>
        </div>

        <label class="field">
          <span>Имя в шапке</span>
          <input value="Настя" />
        </label>

        <label class="field">
          <span>Фраза для листа</span>
          <textarea spellcheck="false">Нельзя выбрасывать подарки!</textarea>
        </label>

        <label class="field">
          <span>Размер письма</span>
          <div class="size-control">
            <button class="size-button" type="button" aria-label="Уменьшить">−</button>
            <output class="size-value">32 px</output>
            <button class="size-button" type="button" aria-label="Увеличить">+</button>
          </div>
        </label>

        <div class="workbench-actions">
          <button class="ghost-button" type="button">↺ Сбросить</button>
          <button class="primary-button" type="button">⎙ Печать / PDF</button>
        </div>
      </section>

      <section class="workbench-preview" aria-label="Предпросмотр">
        <div class="preview-strip">
          <span>A4 · 20 строк · browser print</span>
          <button class="tool-button" type="button">PDF</button>
        </div>
        <article class="sheet-mini" aria-label="Макет листа">
          <p class="sample-copy">Нельзя выбрасывать подарки!</p>
          <div class="sheet-lines">
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
