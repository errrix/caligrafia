<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caligrafia UI concept 03 - Notebook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="layout-notebook">
    <nav class="concept-nav" aria-label="UI concepts">
      <strong>Caligrafia UI research</strong>
      <a href="./01-workbench.html">01 Workbench</a>
      <a href="./02-flow.html">02 Flow</a>
      <a href="./03-notebook.html" aria-current="page">03 Notebook</a>
      <a href="./04-command.html">04 Command</a>
      <a href="./05-atelier.html">05 Atelier</a>
      <a href="./index.html">All</a>
    </nav>

    <main class="notebook-main">
      <section class="notebook-controls" aria-label="Настройки тетради">
        <div class="notebook-title">
          <p class="research-note">03 / Тетрадная страница</p>
          <h1>Пропись для урока</h1>
        </div>

        <label class="field">
          <span>Ученик</span>
          <input value="Настя" />
        </label>

        <label class="field">
          <span>Что будем писать</span>
          <textarea spellcheck="false">Нельзя выбрасывать подарки!</textarea>
        </label>

        <label class="field">
          <span>Высота букв</span>
          <div class="size-control">
            <button class="size-button" type="button" aria-label="Уменьшить">−</button>
            <output class="size-value">32 px</output>
            <button class="size-button" type="button" aria-label="Увеличить">+</button>
          </div>
        </label>

        <div class="notebook-actions">
          <button class="ghost-button" type="button">Очистить</button>
          <button class="primary-button" type="button">Печатать</button>
        </div>
        <p class="research-note">Самый тематичный вариант: UI говорит тем же языком, что и продукт.</p>
      </section>

      <section class="notebook-preview" aria-label="Предпросмотр листа">
        <article class="sheet-mini" aria-label="Макет листа">
          <p class="sample-copy">Нельзя выбрасывать подарки!</p>
          <div class="sheet-lines">
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
            <div class="sheet-row"></div><div class="sheet-row"></div><div class="sheet-row"></div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
